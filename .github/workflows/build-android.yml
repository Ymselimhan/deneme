name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel tetikleme sağlar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Projenize uygun versiyonu seçebilirsiniz
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd "çift uygulması/mobile"
          flutter pub get

      - name: Build APK
        run: |
          cd "çift uygulması/mobile"
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: "çift uygulması/mobile/build/app/outputs/flutter-apk/app-release.apk"
